version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: fintech-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fintech
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

  user-service:
    build: ./services/user-service
    container_name: user-service
    ports:
      - "8001:8000"
    depends_on:
      - mysql
    environment:
      - JWT_SECRET=KKS1b5r4+VXd/MmwW1Pb1wsWsQL5MX5OUpfcm32n5UU=
    volumes:
      - ./services/user-service:/app

  transaction-service:
    build: ./services/transaction-service
    container_name: transaction-service
    ports:
      - "8002:8000"
    depends_on:
      - mysql
    environment:
      - JWT_SECRET=KKS1b5r4+VXd/MmwW1Pb1wsWsQL5MX5OUpfcm32n5UU=
    volumes:
      - ./services/transaction-service:/app
